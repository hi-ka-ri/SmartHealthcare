<!doctype html>
<html lang="en">
<head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body class="bg-light">
<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card p-4 shadow" style="width: 420px;">

        <h3 class="text-center mb-4">Register</h3>

        <form th:action="@{/register}" th:object="${registerRequest}" method="post">
            <div class="form-group">
                <input type="text" th:field="*{username}" class="form-control" placeholder="Username">
                <small class="text-danger" th:errors="*{username}"></small>
            </div>

            <div class="form-group">
                <input type="email" th:field="*{email}" class="form-control" placeholder="Email">
                <small class="text-danger" th:errors="*{email}"></small>
            </div>
            <div class="form-group">
                <input type="text" th:field="*{fullName}" class="form-control" placeholder="Full Name">
                <small class="text-danger" th:errors="*{fullName}"></small>
            </div>

            <div class="form-group">
                <input type="text" th:field="*{phone}" class="form-control" placeholder="Phone">
                <small class="text-danger" th:errors="*{phone}"></small>
            </div>

            <div class="form-group">
                <input type="text" th:field="*{address}" class="form-control" placeholder="Address">
            </div>

            <div class="form-group">
                <select th:field="*{gender}" class="form-control">
                    <option value="">Chọn giới tính</option>
                    <option value="MALE">Nam</option>
                    <option value="FEMALE">Nữ</option>
                    <option value="OTHER">Khác</option>
                </select>
            </div>
            <div class="form-group">
                <input type="password" th:field="*{password}" class="form-control" placeholder="Password">
                <small class="text-danger" th:errors="*{password}"></small>
            </div>

            <div class="form-group">
                <input type="password" th:field="*{confirmPassword}" class="form-control" placeholder="Confirm Password">
                <small class="text-danger" th:errors="*{confirmPassword}"></small>
            </div>

            <button class="btn btn-success w-100">Register</button>
        </form>

        <p class="text-center mt-3">
            Đã có tài khoản?
            <a th:href="@{/login}">Đăng nhập</a>
        </p>

    </div>
</div>

<!-- Optional JavaScript -->
<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>
</html>
