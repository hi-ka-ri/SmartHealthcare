<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Smart Healthcare - Admin Dashboard</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          crossorigin="anonymous">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-danger">
    <a class="navbar-brand">Smart Healthcare - Admin</a>
    <div class="ml-auto">
        <a th:href="@{/profile}" class="btn btn-info mr-3">Hồ sơ cá nhân</a>
        <a th:href="@{/logout}" class="btn btn-light">Đăng xuất</a>
    </div>
</nav>

<div class="container mt-4">
    <h3>Xin chào <span th:text="${profile.fullName}">Quản trị viên</span></h3>

    <div class="row mt-4">

        <div class="col-md-4 mb-3">
            <div class="card p-3 shadow text-center">
                <h5>Danh mục xét nghiệm</h5>
                <a th:href="@{/admin/tests}" class="btn btn-primary">Quản lý</a>
            </div>
        </div>

        <div class="col-md-4 mb-3">
            <div class="card p-3 shadow text-center">
                <h5>Danh mục chuyên khoa</h5>
                <a th:href="@{/admin/specialties}" class="btn btn-success">Quản lý</a>
            </div>
        </div>

        <div class="col-md-4 mb-3">
            <div class="card p-3 shadow text-center">
                <h5>Duyệt đơn thuốc</h5>
                <a th:href="@{/admin/prescriptions}" class="btn btn-warning">Duyệt</a>
            </div>
        </div>

        <div class="col-md-4 mb-3">
            <div class="card p-3 shadow text-center">
                <h5>Danh mục thuốc</h5>
                <a th:href="@{/admin/medicines}" class="btn btn-danger">Quản lý</a>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
</body>
</html>
