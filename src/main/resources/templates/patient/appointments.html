<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đặt lịch khám</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <style>
        body { background: #f5f6fa; }

        .box {
            max-width: 700px;
            margin: 40px auto;
            background: #fff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.08);
        }

        .title {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

<div class="box">

    <div class="title">📅 Đặt lịch khám</div>

    <form th:action="@{/patient/appointments/save}"
          th:object="${appointmentDTO}"
          method="post">

        <!-- SPECIALTY -->
        <div class="mb-3">
            <label>Chuyên khoa</label>
            <select class="form-select"
                    th:field="*{specialtyId}"
                    id="specialty">
                <option value="">-- Chọn chuyên khoa --</option>
                <option th:each="s : ${specialties}"
                        th:value="${s.specialtyId}"
                        th:text="${s.name}">
                </option>
            </select>
        </div>

        <!-- DOCTOR (dynamic) -->
        <div class="mb-3">
            <label>Bác sĩ</label>
            <select class="form-select"
                    th:field="*{doctorId}"
                    id="doctor">
                <option value="">-- Chọn bác sĩ --</option>
            </select>
        </div>

        <!-- DATE -->
        <div class="mb-3">
            <label>Ngày khám</label>
            <input type="date"
                   class="form-control"
                   th:field="*{appointmentDate}"
                   id="date">
        </div>

        <!-- TIME (DB driven) -->
        <div class="mb-3">
            <label>Giờ khám</label>
            <select class="form-select"
                    th:field="*{appointmentTime}"
                    id="time">
                <option value="">-- Chọn giờ --</option>
            </select>
        </div>

        <button class="btn btn-primary w-100">
            Đặt lịch
        </button>

    </form>
</div>
