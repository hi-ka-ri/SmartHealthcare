<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Smart Healthcare - Đăng nhập</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #eef7f4;
        }
        .auth-wrap {
            display: flex;
            width: 780px;
            min-height: 520px;
            border-radius: 16px;
            overflow: hidden;
            border: 0.5px solid #cce8de;
            box-shadow: 0 8px 40px rgba(15,110,86,0.08);
        }
        .side {
            width: 240px;
            flex-shrink: 0;
            background: #0f6e56;
            padding: 44px 28px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .brand { display: flex; align-items: center; gap: 10px; color: #fff; margin-bottom: 8px; }
        .brand i { font-size: 22px; color: #9fe1cb; }
        .brand-name { font-size: 15px; font-weight: 600; }
        .tagline { font-size: 12px; color: #9fe1cb; line-height: 1.6; }
        .features { list-style: none; margin-top: 32px; display: flex; flex-direction: column; gap: 16px; }
        .features li { display: flex; align-items: center; gap: 10px; font-size: 12px; color: #c5ead8; }
        .features li i { font-size: 16px; color: #5dcaa5; }
        .side-footer { font-size: 11px; color: #5dcaa5; }
        .form-area {
            flex: 1;
            background: #fff;
            padding: 52px 44px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        h1 { font-family: 'Playfair Display', serif; font-size: 26px; color: #0a4a3a; margin-bottom: 6px; }
        .sub { font-size: 13px; color: #888; margin-bottom: 32px; }
        .field { margin-bottom: 16px; }
        label {
            display: block; font-size: 11px; font-weight: 500;
            letter-spacing: 0.06em; text-transform: uppercase;
            color: #999; margin-bottom: 6px;
        }
        .inp-wrap { position: relative; }
        .inp-wrap i {
            position: absolute; left: 12px; top: 50%;
            transform: translateY(-50%); font-size: 16px;
            color: #9fe1cb; pointer-events: none;
        }
        input[type="email"], input[type="password"] {
            width: 100%; height: 44px;
            padding: 0 14px 0 38px;
            border: 0.5px solid #cce8de; border-radius: 8px;
            font-size: 14px; font-family: 'DM Sans', sans-serif;
            background: #f6fbf9; color: #1a1a2e; outline: none;
            transition: border-color 0.15s;
        }
        input:focus { border-color: #1d9e75; background: #fff; }
        .error-text { font-size: 12px; color: #c0392b; margin-top: 4px; }
        .btn {
            width: 100%; height: 46px;
            background: #0f6e56; color: #fff;
            border: none; border-radius: 8px;
            font-size: 14px; font-weight: 500;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer; margin-top: 8px;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: background 0.15s;
        }
        .btn:hover { background: #085041; }
        .alert {
            font-size: 13px; text-align: center;
            padding: 10px 14px; border-radius: 8px; margin-top: 14px;
        }
        .alert-danger { background: #fdf2f2; color: #c0392b; border: 0.5px solid #f5c6c6; }
        .alert-success { background: #f0faf5; color: #0f6e56; border: 0.5px solid #9fe1cb; }
        .footer-link { text-align: center; font-size: 13px; color: #888; margin-top: 22px; }
        .footer-link a { color: #1d9e75; text-decoration: none; font-weight: 500; }
    </style>
</head>
<body>
<div class="auth-wrap">
    <div class="side">
        <div>
            <div class="brand">
                <i class="ti ti-heart-pulse"></i>
                <span class="brand-name">Smart Healthcare</span>
            </div>
            <p class="tagline">Hệ thống quản lý phòng khám thông minh</p>
            <ul class="features">
                <li><i class="ti ti-calendar-check"></i>Đặt lịch khám dễ dàng</li>
                <li><i class="ti ti-file-medical"></i>Hồ sơ bệnh án số</li>
                <li><i class="ti ti-clock"></i>Nhắc nhở lịch hẹn</li>
                <li><i class="ti ti-shield-check"></i>Bảo mật thông tin</li>
            </ul>
        </div>
        <p class="side-footer">© 2026 Smart Healthcare</p>
    </div>

    <div class="form-area">
        <h1>Xin chào!</h1>
        <p class="sub">Đăng nhập để quản lý sức khoẻ của bạn</p>

        <form th:action="@{/login}" method="post">
            <div class="field">
                <label>Email</label>
                <div class="inp-wrap">
                    <i class="ti ti-mail"></i>
                    <input type="email" name="username" placeholder="you@example.com"
                           th:value="${param.username}">
                </div>
            </div>
            <div class="field">
                <label>Mật khẩu</label>
                <div class="inp-wrap">
                    <i class="ti ti-lock"></i>
                    <input type="password" name="password" placeholder="••••••••">
                </div>
            </div>
            <button type="submit" class="btn">
                <i class="ti ti-login"></i> Đăng nhập
            </button>
        </form>

        <div class="alert alert-danger" th:if="${param.error}">
            <i class="ti ti-alert-circle"></i>
            <span th:text="${param.message} ?: 'Email hoặc mật khẩu không đúng'"></span>
        </div>
        <div class="alert alert-success" th:if="${param.logout}">
            <i class="ti ti-circle-check"></i> Đăng xuất thành công
        </div>

        <p class="footer-link">
            Chưa có tài khoản? <a th:href="@{/register}">Đăng ký ngay</a>
        </p>
    </div>
</div>
</body>
</html>
